name: Build Armbian
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch'
        required: true
        default: 'current'
      release:
        description: 'Release'
        required: true
        default: 'bullseye'
      board:
        description: 'Board'
        required: true
        default: 'aml-s805-mxq'
      build_desktop:
        description: 'Build Desktop'
        required: true
        default: 'no'
      soc:
        description: 'Set Amlogic SoC'
        required: true
        default: 's805'
      kernel:
        description: 'Set kernel version'
        required: true
        default: '5.10.160'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt install -y git build-essential libssl-dev libncurses5-dev unzip bc bison flex libelf-dev qemu-user-static binfmt-support debootstrap rsync xz-utils device-tree-compiler u-boot-tools python3 python3-pip parted dosfstools mtools
          sudo pip3 install -U pip

      - name: Build Armbian (non-root)
        run: |
          # 切换到非 root 用户执行（修复权限错误）
          sudo chown -R ubuntu:ubuntu .
          su - ubuntu -c "cd $(pwd)/build-armbian && ./compile.sh \
            BOARD=aml-s805-mxq \
            BRANCH=current \
            RELEASE=${{ github.event.inputs.release }} \
            BUILD_DESKTOP=${{ github.event.inputs.build_desktop }} \
            BUILD_MINIMAL=yes \
            CLEAN_LEVEL=make,debs \
            COMPRESS_OUTPUTIMAGE=sha \
            EXPERT=yes \
            HOST=armbian \
            KERNEL_CONFIGURE=no \
            KERNEL_VERSION=${{ github.event.inputs.kernel }} \
            SHARE_LOG=yes"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Armbian-S805-Image
          path: build-armbian/output/images/*.img.xz
